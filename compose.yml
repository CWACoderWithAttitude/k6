version: '3.8'
services:
  influxdb:
    image: influxdb:1.8
    ports:
      - "8086:8086"
    environment:
      - INFLUXDB_DB=k6
    volumes:
      - influxdb-data:/var/lib/influxdb

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    depends_on:
      - influxdb
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana

  k6:
    image: grafana/k6
    volumes:
      - ./volker-benders.de2.js:/volker-benders.de2.js
    environment:
      - K6_OUT=influxdb=http://influxdb:8086/k6
    command: ["run", "/volker-benders.de2.js"]

volumes:
  influxdb-data:
  grafana-data:

